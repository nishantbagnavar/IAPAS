version: '3.8'

services:

  # ── MySQL Database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: iapas_root_pass
      MYSQL_DATABASE: iapas_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-piapas_root_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:iapas_root_pass@db:3306/iapas_db
      SECRET_KEY: iapas-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Browser (not container) connects to backend, so localhost:8000 is correct
        VITE_API_URL: http://localhost:8000
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
